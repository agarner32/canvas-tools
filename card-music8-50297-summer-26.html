<script>
(function() {
  var raw = document.getElementById("card-data").value;

  document.head.appendChild(style);
  var MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  function fmtDate(d) { return MONTHS[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear(); }
  function fmtDateTime(iso) {
    var d = new Date(iso); var h = d.getHours(), m = d.getMinutes();
    var ampm = h >= 12 ? "PM" : "AM"; var h12 = h % 12 || 12;
    var mStr = m === 0 ? "" : ":" + String(m).padStart(2,"0");
    return DAYS[d.getDay()] + ", " + MONTHS[d.getMonth()] + " " + d.getDate() + " at " + h12 + mStr + " " + ampm;
  }
  function getWeekBounds(today) {
    var d = new Date(today); var day = d.getDay();
    var diffToMon = day === 0 ? -6 : 1 - day;
    var mon = new Date(d); mon.setDate(d.getDate() + diffToMon); mon.setHours(0,0,0,0);
    var sun = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23,59,59,999);
    return { mon: mon, sun: sun };
  }
  function fmtWeekRange(mon, sun) {
    if (mon.getMonth() === sun.getMonth()) return MONTHS[mon.getMonth()] + " " + mon.getDate() + "–" + sun.getDate();
    return MONTHS[mon.getMonth()] + " " + mon.getDate() + " – " + MONTHS[sun.getMonth()] + " " + sun.getDate();
  }
  function typeIcon(type) {
    if (type === "quiz") return "✅";
    if (type === "discussion") return "💬";
    return "📝";
  }
  function getWeekNumber(today, allDates) {
    var sorted = allDates.slice().sort(function(a,b){ return new Date(a) - new Date(b); });
    var first = new Date(sorted[0]); var day = first.getDay();
    var diffToMon = day === 0 ? -6 : 1 - day;
    var firstMon = new Date(first); firstMon.setDate(first.getDate() + diffToMon); firstMon.setHours(0,0,0,0);
    return Math.floor((today.getTime() - firstMon.getTime()) / (7 * 24 * 60 * 60 * 1000)) + 1;
  }
  function escHtml(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function render() {
    var root = document.getElementById("root");
    var today = new Date();
    var bounds = getWeekBounds(today);
    var mon = bounds.mon, sun = bounds.sun;
    var weekRange = fmtWeekRange(mon, sun);
    var allDates = ITEMS.map(function(i){ return i.dueAt; });
    var firstDue = new Date(Math.min.apply(null, allDates.map(function(d){ return new Date(d); })));
    var lastDue = new Date(Math.max.apply(null, allDates.map(function(d){ return new Date(d); })));
    if (today < firstDue) {
      root.innerHTML = "<div class="card-header"><div class="header-left"><span class="course-name">" + escHtml(COURSE_NAME) + "</span></div></div><div class="card-body"><div class="state-card"><div class="icon">📅</div><div class="msg">Course begins soon</div><div class="sub">First item due " + fmtDate(firstDue) + "</div></div></div>";
      return;
    }
    if (today > lastDue) {
      root.innerHTML = "<div class="card-header"><div class="header-left"><span class="course-name">" + escHtml(COURSE_NAME) + "</span></div></div><div class="card-body"><div class="state-card"><div class="icon">✓</div><div class="msg">Semester complete</div><div class="sub">Great work this semester!</div></div></div>";
      return;
    }
    var weekItems = ITEMS.filter(function(i){ var d = new Date(i.dueAt); return d >= mon && d <= sun; });
    var weekNum = getWeekNumber(today, allDates);
    var headerHtml = "<div class="card-header"><div class="header-left"><span class="course-name">" + escHtml(COURSE_NAME) + "</span><span class="week-pill">Week " + weekNum + "</span></div><span class="date-range">" + weekRange + "</span></div>";
    if (weekItems.length === 0) {
      root.innerHTML = headerHtml + "<div class="card-body"><div class="nothing-due"><div class="check">✔️</div><div class="msg">Nothing due this week</div><div class="sub">Keep up with your reading and lecture materials</div></div></div>";
      return;
    }
    var byModule = {};
    weekItems.forEach(function(item){ if (!byModule[item.moduleName]) byModule[item.moduleName] = []; byModule[item.moduleName].push(item); });
    var moduleNames = Object.keys(byModule);
    var multiModule = moduleNames.length > 1;
    var bodyHtml = "<div class="card-body">";
    moduleNames.forEach(function(modName) {
      var modItems = byModule[modName];
      if (multiModule) bodyHtml += "<div class="multi-module">";
      bodyHtml += "<div class="module-label">" + escHtml(modName) + "</div><div class="items-list">";
      modItems.forEach(function(item) {
        bodyHtml += "<div class="due-item"><div class="due-item-icon">" + typeIcon(item.type) + "</div><div class="due-item-text"><div class="due-item-title">" + escHtml(item.title) + "</div><div class="due-item-date">Due " + fmtDateTime(item.dueAt) + "</div></div></div>";
      });
      bodyHtml += "</div>";
      if (multiModule) bodyHtml += "</div>";
    });
    bodyHtml += "</div>";
    root.innerHTML = headerHtml + bodyHtml;
  }
  render();
  function reportHeight() { window.parent.postMessage({ iframeHeight: document.body.scrollHeight }, "*"); }
  reportHeight();
  window.addEventListener("resize", reportHeight);
  setTimeout(reportHeight, 300);
})();
</script>
