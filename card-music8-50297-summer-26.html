  const COURSE_NAME = "Music 8 \"Exploring Jazz, Ragtime and Blues\";
  const TEXT_COLOR = "#ffffff";
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DAYS_LONG = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  function fmtDate(d) { return MONTHS[d.getMonth()] + '\u00a0' + d.getDate() + ', ' + d.getFullYear(); }
  function fmtDateTime(iso) {
    const d = new Date(iso);
    const h = d.getHours(); const m = d.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = h % 12 || 12;
    const mStr = m === 0 ? '' : ':' + String(m).padStart(2,'0');
    return DAYS_LONG[d.getDay()] + ', ' + MONTHS[d.getMonth()] + '\u00a0' + d.getDate() + ' at ' + h12 + mStr + '\u00a0' + ampm;
  }
  function getWeekBounds(today) {
    const d = new Date(today);
    const day = d.getDay();
    const diffToMon = day === 0 ? -6 : 1 - day;
    const mon = new Date(d); mon.setDate(d.getDate() + diffToMon); mon.setHours(0,0,0,0);
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23,59,59,999);
    return { mon, sun };
  }
  function fmtWeekRange(mon, sun) {
    if (mon.getMonth() === sun.getMonth()) return MONTHS[mon.getMonth()] + '\u00a0' + mon.getDate() + '\u2013' + sun.getDate();
    return MONTHS[mon.getMonth()] + '\u00a0' + mon.getDate() + ' \u2013 ' + MONTHS[sun.getMonth()] + '\u00a0' + sun.getDate();
  }
  function typeIcon(type) {
    if (type === 'quiz') return '\u2705';
    if (type === 'discussion') return '\uD83D\uDCAC';
    return '\uD83D\uDCDD';
  }
  function getWeekNumber(today, allDates) {
    const sorted = [...allDates].sort((a,b) => new Date(a) - new Date(b));
    const first = new Date(sorted[0]);
    const day = first.getDay();
    const diffToMon = day === 0 ? -6 : 1 - day;
    const firstMon = new Date(first); firstMon.setDate(first.getDate() + diffToMon); firstMon.setHours(0,0,0,0);
    const ms = today.getTime() - firstMon.getTime();
    return Math.floor(ms / (7 * 24 * 60 * 60 * 1000)) + 1;
  }
  function render() {
    const root = document.getElementById('root');
    const today = new Date();
    const { mon, sun } = getWeekBounds(today);
    const weekRange = fmtWeekRange(mon, sun);
    const allDates = ITEMS.map(i => i.dueAt);
    const firstDue = new Date(Math.min(...allDates.map(d => new Date(d))));
    const lastDue  = new Date(Math.max(...allDates.map(d => new Date(d))));
    if (today < firstDue) {
      root.innerHTML = `<div class="card-header"><div class="header-left"><span class="course-name">${COURSE_NAME}</span></div></div><div class="card-body"><div class="state-card"><div class="icon">\uD83D\uDCC5</div><div class="msg">Course begins soon</div><div class="sub">First item due ${fmtDate(firstDue)}</div></div></div>`;
      return;
    }
    if (today > lastDue) {
      root.innerHTML = `<div class="card-header"><div class="header-left"><span class="course-name">${COURSE_NAME}</span></div></div><div class="card-body"><div class="state-card"><div class="icon">\u2713</div><div class="msg">Semester complete</div><div class="sub">Great work this semester!</div></div></div>`;
      return;
    }
    const weekItems = ITEMS.filter(i => { const d = new Date(i.dueAt); return d >= mon && d <= sun; });
    const weekNum = getWeekNumber(today, allDates);
    const headerHtml = `<div class="card-header"><div class="header-left"><span class="course-name">${COURSE_NAME}</span><span class="week-pill">Week ${weekNum}</span></div><span class="date-range">${weekRange}</span></div>`;
    if (weekItems.length === 0) {
      root.innerHTML = headerHtml + `<div class="card-body"><div class="nothing-due"><div class="check">\u2714\uFE0F</div><div class="msg">Nothing due this week</div><div class="sub">Keep up with your reading and lecture materials</div></div></div>`;
      return;
    }
    const byModule = {};
    weekItems.forEach(item => { if (!byModule[item.moduleName]) byModule[item.moduleName] = []; byModule[item.moduleName].push(item); });
    const moduleNames = Object.keys(byModule);
    const multiModule = moduleNames.length > 1;
    let bodyHtml = '<div class="card-body">';
    moduleNames.forEach(modName => {
      const modItems = byModule[modName];
      if (multiModule) bodyHtml += `<div class="multi-module">`;
      bodyHtml += `<div class="module-label">${modName}</div><div class="items-list">`;
      modItems.forEach(item => {
        bodyHtml += `<div class="due-item"><div class="due-item-icon">${typeIcon(item.type)}</div><div class="due-item-text"><div class="due-item-title">${item.title}</div><div class="due-item-date">Due ${fmtDateTime(item.dueAt)}</div></div></div>`;
      });
      bodyHtml += `</div>`;
      if (multiModule) bodyHtml += `</div>`;
    });
    bodyHtml += '</div>';
    root.innerHTML = headerHtml + bodyHtml;
  }
  render();
  function reportHeight() { window.parent.postMessage({ iframeHeight: document.body.scrollHeight }, '*'); }
  reportHeight();
  window.addEventListener('resize', reportHeight);
  setTimeout(reportHeight, 300);
</script>
